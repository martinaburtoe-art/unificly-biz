name: CI

# Runs on every push and PR to main. This is the minimum safety net Nüva One
# had zero of before: if this goes red, something is actually broken --
# investigate before merging/deploying, don't just re-run it.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      # NOTE: this is a *static* build check (does the app compile/bundle),
      # not a runtime check. Vite happily builds even with the VITE_SUPABASE_*
      # vars unset -- it just inlines `undefined`, which would break at
      # runtime, not at build time. Catching that class of bug needs a real
      # E2E test hitting a live/staging Supabase project, which is the next
      # step up from this baseline (see FASE 5 del roadmap), not something to
      # fake here with placeholder values that would hide real misconfiguration.
      - name: Build
        run: npm run build

  database-tests:
    name: pgTAP database tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Spins up a throwaway local Postgres (via Docker, already available
      # on this runner), applies every migration in supabase/migrations,
      # then runs every *.sql file in supabase/tests/database with pgTAP.
      # Nothing here touches the real project -- this is a brand new,
      # disposable database created and destroyed within this job.
      - name: Run pgTAP tests
        id: pgtap
        run: supabase test db 2>&1 | tee /tmp/pgtap-output.log
        continue-on-error: true

      # TEMPORARY debug aid: raw Actions logs live on Azure Blob Storage,
      # which isn't reachable from the assistant's sandbox network. Posting
      # the tail of the log as a commit comment makes it readable via the
      # regular GitHub API instead. Remove once the pipeline is green.
      - name: Post failure log as commit comment (debug aid)
        if: steps.pgtap.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAIL=$(tail -c 55000 /tmp/pgtap-output.log)
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "$(jq -n --arg body "$TAIL" '{body: ("pgTAP failure log (debug):\n\n```\n" + $body + "\n```")}')"

      - name: Fail job if pgTAP tests failed
        if: steps.pgtap.outcome == 'failure'
        run: exit 1
